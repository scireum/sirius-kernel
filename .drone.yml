---
scireum_m2_volumes: &scireum_m2_volumes
  - name: m2
    path: /root/.m2

scireum_m2_docker_volumes: &scireum_m2_docker_volumes
  - name: docker_socket
    path: /var/run/docker.sock
  - name: m2
    path: /root/.m2

kind: pipeline
name: default

platform:
  os: linux
  arch: amd64

clone:
  depth: 100

steps:
  - name: compile
    image: scireum/sirius-build-jdk24
    commands:
      - mvn clean compile
    volumes: *scireum_m2_volumes
    when:
      branch:
        - main
      event:
        - push

  - name: cron_unit_tests
    image: scireum/sirius-build-jdk24
    commands:
      - mvn clean test
    volumes: *scireum_m2_docker_volumes
    when:
      event:
        - cron

  - name: cron_report_failures
    image: plugins/slack
    settings:
      webhook:
        from_secret: scireum_dev_mio
      channel: scireum-dev
    when:
      status:
        - failure
      event:
        - cron

  - name: test
    image: scireum/sirius-build-jdk24
    commands:
      - mvn clean test -Dtest.excluded.groups=nightly
    volumes: *scireum_m2_docker_volumes
    when:
      event:
        - pull_request

  - name: deploy
    image: scireum/sirius-build-jdk24
    commands:
      - sed -i 's/DEVELOPMENT-SNAPSHOT/${DRONE_TAG}/g' pom.xml
      - mvn clean deploy -DskipTests
    volumes: *scireum_m2_volumes
    when:
      event:
        - tag

  - name: notify-tag-build
    image: plugins/slack
    settings:
      webhook:
        from_secret: scireum_dev_mio
      channel: scireum-dev
      template: "A new version is available: **{{Repo.Name}}**: [{{Build.Tag}}](https://github.com/scireum/sirius-kernel/releases/tag/{{Build.Tag}})"
    when:
      event:
        - tag

  - name: sonar
    image: scireum/sirius-build-jdk24
    commands:
      - sed -i 's/DEVELOPMENT-SNAPSHOT/${DRONE_TAG}/g' pom.xml
      - mvn clean org.jacoco:jacoco-maven-plugin:prepare-agent test org.jacoco:jacoco-maven-plugin:report sonar:sonar -Dsonar.projectKey=${DRONE_REPO_NAME}
    volumes: *scireum_m2_docker_volumes
    when:
      event:
        - tag

volumes:
  - name: docker_socket
    host:
      path: /var/run/docker.sock
  - name: m2
    host:
      path: /root/.m2
